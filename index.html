<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Galena Commons</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --navy: #1f3a5f;
    --navy-deep: #16293f;
    --sage: #6b8e5a;
    --honey: #e9c876;
    --cream: #f7f3ec;
    --cream-dim: #ece5d6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--navy-deep); font-family: 'Source Serif 4', Georgia, serif; color: var(--cream); }

  /* === ALL SLIDES === */
  .slide { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; opacity: 0; pointer-events: none; transition: opacity 0.9s ease; overflow: hidden; }
  .slide.active { opacity: 1; pointer-events: auto; }

  /* === MAIN DIRECTORY SLIDE === */
  #mainSlide { display: flex; flex-direction: column; background: radial-gradient(ellipse at 20% 0%, rgba(107,142,90,0.12), transparent 55%), radial-gradient(ellipse at 85% 100%, rgba(233,200,118,0.08), transparent 50%), var(--navy-deep); }
  header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 2vh 3.5vw; border-bottom: 1px solid rgba(233,200,118,0.25); }
  .brand { display: flex; align-items: center; gap: 1.2vw; }
  .brand svg { width: 4vw; height: 4vw; min-width: 44px; min-height: 44px; }
  .brand-text .name { font-family: 'Cinzel', Georgia, serif; font-size: 2.7vw; letter-spacing: 0.04em; line-height: 1; }
  .brand-text .name .commons { color: var(--honey); }
  .brand-text .addr { font-family: 'Raleway', sans-serif; font-size: 1.05vw; color: var(--cream-dim); letter-spacing: 0.08em; margin-top: 0.5vh; text-transform: uppercase; }
  /* Persistent time/date overlay — sits above ALL slides (main + every
     business slide), not nested inside any one slide. A semi-opaque dark
     pill behind it guarantees contrast whether the active slide underneath
     is a dark gradient or one of the light-theme slides. */
  .corner-clock {
    position: fixed;
    top: 2vh;
    right: 2vw;
    z-index: 50;
    text-align: right;
    font-family: 'Raleway', sans-serif;
    color: #f7f3ec;
    background: rgba(10, 18, 28, 0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 0.8vh 1.1vw;
    pointer-events: none;
  }
  .corner-clock .time { font-size: 1.6vw; font-weight: 400; line-height: 1; }
  .corner-clock .date { font-size: 0.8vw; opacity: 0.85; margin-top: 0.4vh; letter-spacing: 0.06em; text-transform: uppercase; }
  main { flex: 1; display: grid; grid-template-columns: 1.1fr 1fr; min-height: 0; }
  .panel { padding: 2.5vh 3.5vw; overflow: hidden; }
  .panel + .panel { border-left: 1px solid rgba(233,200,118,0.2); }
  .panel h2 { font-family: 'Cinzel', Georgia, serif; font-size: 1.55vw; letter-spacing: 0.1em; color: var(--honey); text-transform: uppercase; margin-bottom: 2.2vh; display: flex; align-items: center; gap: 0.8vw; }
  .panel h2::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(233,200,118,0.4), transparent); }
  .floor-block { margin-bottom: 2.2vh; }
  .floor-label { font-family: 'Raleway', sans-serif; font-size: 1vw; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sage); margin-bottom: 1vh; }
  .tenant-row { display: flex; align-items: baseline; gap: 1vw; padding: 1vh 0; border-bottom: 1px dotted rgba(247,243,236,0.18); font-size: 1.65vw; }
  .tenant-row .dot { width: 0.5vw; height: 0.5vw; min-width: 6px; min-height: 6px; border-radius: 50%; background: var(--honey); flex-shrink: 0; }
  .tenant-row .tname { font-weight: 600; }
  .tenant-row .ttag { font-family: 'Raleway', sans-serif; font-size: 1vw; color: var(--cream-dim); margin-left: auto; }
  .event-card { display: flex; gap: 1.3vw; padding: 1.6vh 0; border-bottom: 1px solid rgba(247,243,236,0.1); }
  .event-date { flex-shrink: 0; width: 5vw; text-align: center; background: rgba(107,142,90,0.18); border: 1px solid rgba(107,142,90,0.4); border-radius: 8px; padding: 0.9vh 0; font-family: 'Raleway', sans-serif; }
  .event-date.is-today { background: rgba(233,200,118,0.22); border-color: rgba(233,200,118,0.6); }
  .event-date .mon { font-size: 0.85vw; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sage); }
  .event-date.is-today .mon { color: var(--honey); }
  .event-date .day { font-size: 1.95vw; font-weight: 700; line-height: 1.1; }
  .event-info { display: flex; flex-direction: column; justify-content: center; }
  .event-info .etitle { font-size: 1.5vw; font-weight: 600; display: flex; align-items: center; gap: 0.6vw; }
  .event-info .emeta { font-family: 'Raleway', sans-serif; font-size: 1.05vw; color: var(--cream-dim); margin-top: 0.4vh; }
  .today-badge { font-family: 'Raleway', sans-serif; font-size: 0.7vw; font-weight: 700; letter-spacing: 0.1em; color: var(--navy-deep); background: var(--honey); padding: 0.25vh 0.6vw; border-radius: 20px; }

  /* Fallback content in the "Upcoming" panel when there's nothing dated
     in the lookahead window — the regular weekly worship schedule. */
  .sched-fallback-heading {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 1.2vw;
    letter-spacing: 0.06em;
    color: var(--honey);
    text-transform: uppercase;
    margin-bottom: 1.6vh;
  }
  .sched-fallback-row {
    display: flex;
    align-items: baseline;
    gap: 1vw;
    padding: 1vh 0;
    border-bottom: 1px dotted rgba(247,243,236,0.18);
  }
  .sched-fallback-row .dot {
    width: 0.5vw; height: 0.5vw; min-width: 6px; min-height: 6px;
    border-radius: 50%;
    background: var(--honey);
    flex-shrink: 0;
    margin-top: 0.6vh;
  }
  .sched-fallback-name {
    font-size: 1.4vw;
    font-weight: 600;
  }
  .sched-fallback-meta {
    font-family: 'Raleway', sans-serif;
    font-size: 1vw;
    color: var(--cream-dim);
    margin-top: 0.3vh;
  }
  .sched-fallback-note {
    font-family: 'Raleway', sans-serif;
    font-size: 0.95vw;
    color: var(--cream-dim);
    opacity: 0.85;
    font-style: italic;
    margin-top: 2vh;
    line-height: 1.5;
  }
  footer { flex-shrink: 0; display: flex; align-items: center; gap: 2vw; padding: 1.4vh 3.5vw; background: rgba(0,0,0,0.18); border-top: 1px solid rgba(233,200,118,0.25); }
  .wx { display: flex; align-items: center; gap: 0.8vw; flex-shrink: 0; font-family: 'Raleway', sans-serif; }
  .wx svg { width: 2.4vw; height: 2.4vw; min-width: 28px; }
  .wx .temp { font-size: 1.9vw; font-weight: 700; }
  .wx .cond { font-size: 1vw; color: var(--cream-dim); }
  .ticker-wrap { flex: 1; overflow: hidden; white-space: nowrap; mask-image: linear-gradient(to right, transparent, black 4%, black 96%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, black 4%, black 96%, transparent); }
  .ticker { display: inline-block; padding-left: 100%; font-family: 'Raleway', sans-serif; font-size: 1.15vw; animation: scroll-left var(--ticker-duration, 40s) linear infinite; }
  .ticker .sep { color: var(--honey); margin: 0 1.4vw; }
  @keyframes scroll-left { from { transform: translateX(0); } to { transform: translateX(-100%); } }
  .progress-dots { display: flex; gap: 0.5vw; flex-shrink: 0; }
  .progress-dots span { width: 8px; height: 8px; border-radius: 50%; background: rgba(233,200,118,0.3); transition: background 0.3s; }
  .progress-dots span.active { background: var(--honey); }

  /* === BUSINESS SLIDES === */
  .biz-slide {
    display: flex;
    flex-direction: column;
  }
  .biz-accent-bar { flex-shrink: 0; height: 7px; width: 100%; }

  .biz-body {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 4vw;
    padding: 4vh 7vw;
    min-height: 0;
  }

  .biz-left {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-width: 0;
  }

  /* Logo card — white bg for logos with transparency */
  .logo-card {
    background: white;
    border-radius: 18px;
    padding: 3vh 4vw;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 3.5vh;
    width: fit-content;
    max-width: 68vw;
    min-height: 28vh;
  }
  .logo-card img {
    max-height: 36vh;
    max-width: 62vw;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  /* Dark bg logo — no white card, image sits directly on slide */
  .logo-direct {
    margin-bottom: 3.5vh;
  }
  .logo-direct img {
    max-height: 32vh;
    max-width: 44vw;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  /* Text-only logo for tenants without embeddable logos */
  .logo-text {
    margin-bottom: 3.5vh;
  }
  .logo-text-name {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 6vw;
    line-height: 1.1;
    font-weight: 700;
  }
  .logo-text-sub {
    font-family: 'Raleway', sans-serif;
    font-size: 1.8vw;
    font-weight: 300;
    margin-top: 1.1vh;
    opacity: 0.75;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* WAYFINDING: the "where is this / how do I get there" line. This must
     outrank the marketing tagline visually — it's the one piece of info
     that actually serves someone standing in the lobby. */
  .biz-wayfind {
    display: flex;
    align-items: center;
    gap: 0.7vw;
    font-family: 'Raleway', sans-serif;
    font-size: 1.75vw;
    font-weight: 700;
    letter-spacing: 0.02em;
    opacity: 0.99;
    margin-bottom: 1.1vh;
  }
  .biz-wayfind svg { width: 1.7vw; height: 1.7vw; min-width: 22px; flex-shrink: 0; }

  /* Category/schedule label — decorative context, intentionally quieter
     than the wayfinding line above it. */
  .biz-eyebrow {
    font-family: 'Raleway', sans-serif;
    font-size: 1vw;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 2vh;
  }
  .biz-tagline {
    font-family: 'Raleway', sans-serif;
    font-size: 1.55vw;
    font-weight: 300;
    line-height: 1.6;
    opacity: 0.9;
    margin-bottom: 2.2vh;
  }
  .biz-url {
    font-family: 'Raleway', sans-serif;
    font-size: 1.15vw;
    letter-spacing: 0.06em;
    opacity: 0.55;
  }

  .biz-right {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-wrap {
    background: white;
    padding: 16px;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .qr-label {
    font-family: 'Raleway', sans-serif;
    font-size: 0.85vw;
    color: #1f3a5f;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
  }

  .biz-footer {
    flex-shrink: 0;
    text-align: center;
    padding: 1.5vh 0 2vh;
    font-family: 'Cinzel', Georgia, serif;
    font-size: 0.9vw;
    letter-spacing: 0.15em;
    opacity: 0.3;
  }
  .biz-bg-dots {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: radial-gradient(circle, white 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
  }

  /* LIGHT-THEME SLIDE VARIANT: for tenants whose transparent-background
     logo reads better sitting directly on a light page than boxed into a
     small white card on a dark gradient. Base text color flips to navy
     via inline style (see buildBizSlides); these rules cover the pieces
     that assumed a dark backdrop specifically. */
  .slide.light-theme .biz-bg-dots {
    background-image: radial-gradient(circle, #1f3a5f 1px, transparent 1px);
    opacity: 0.05;
  }
  .slide.light-theme .qr-wrap {
    box-shadow: 0 0 0 1px rgba(31,58,95,0.14), 0 6px 18px rgba(31,58,95,0.10);
  }
  .slide.light-theme .biz-footer {
    opacity: 0.4;
  }

  /* === COUNSELOR HIGHLIGHT === */
  .counselor-card {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    padding: 2vh 1.8vw;
    margin-top: 2vh;
    max-width: 36vw;
  }
  .counselor-name {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 1.3vw;
    font-weight: 600;
    margin-bottom: 1.1vh;
    color: #f7f3ec;
  }
  .counselor-bio {
    font-family: 'Raleway', sans-serif;
    font-size: 1.05vw;
    font-weight: 300;
    line-height: 1.6;
    opacity: 0.88;
    margin-bottom: 1.3vh;
  }
  .counselor-focus {
    font-family: 'Raleway', sans-serif;
    font-size: 1.05vw;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 1.3vh;
  }
  .counselor-meta {
    font-family: 'Raleway', sans-serif;
    font-size: 0.95vw;
    letter-spacing: 0.04em;
    opacity: 0.7;
    line-height: 1.5;
  }

  /* === RENTAL / SPACE-AVAILABILITY SLIDE ===
     Full-slide two-column layout advertising available space (short-term
     bookings + office leasing). This is a Commons-branded institutional
     slide, not a tenant slide, so it bypasses the biz-left/biz-right/QR
     template entirely — same pattern as the event-slide type below. */
  .rental-body {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 3vh 5vw 2vh;
    min-height: 0;
  }
  .rental-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.6vw;
    margin-bottom: 2vh;
  }
  .rental-logo img {
    max-height: 11vh;
    max-width: 12vw;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }
  .rental-headline {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 2.9vw;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .rental-columns {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 3vw;
    min-height: 0;
  }
  .rental-divider {
    width: 1px;
    align-self: stretch;
    background: rgba(255,255,255,0.18);
    margin: 2vh 0;
  }
  .rental-col {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.4vh;
  }
  .rental-col-title {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 2.1vw;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 0.7vh;
  }
  .rental-col-sub {
    font-family: 'Raleway', sans-serif;
    font-size: 1.05vw;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.65;
    margin-bottom: 1.5vh;
  }
  .rental-col-items {
    list-style: none;
    padding: 0;
    margin: 0;
    font-family: 'Raleway', sans-serif;
    font-size: 1.35vw;
    font-weight: 300;
    line-height: 1.9;
    opacity: 0.94;
  }
  .rental-col-items li {
    padding-left: 1.4vw;
    position: relative;
  }
  .rental-col-items li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.75em;
    width: 0.5vw;
    height: 0.5vw;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.5;
  }
  .rental-cta {
    display: flex;
    justify-content: center;
    margin-top: 1.5vh;
  }
  .rental-contact {
    text-align: center;
    font-family: 'Raleway', sans-serif;
    font-size: 1.15vw;
    letter-spacing: 0.02em;
    opacity: 0.88;
    margin-top: 1.5vh;
  }

  /* === EVENT SLIDES === */
  .event-slide-body {
    flex: 1;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 4vh 7vw;
    min-height: 0;
    gap: 4vw;
  }
  .event-slide-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .event-slide-date {
    font-family: 'Raleway', sans-serif;
    font-size: 1.3vw;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 2.1vh;
  }
  .event-slide-title {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 4.2vw;
    line-height: 1.15;
    margin-bottom: 3.1vh;
    color: #f7f3ec;
  }
  .event-slide-details {
    font-family: 'Raleway', sans-serif;
    font-size: 1.55vw;
    font-weight: 300;
    line-height: 1.65;
    opacity: 0.9;
    margin-bottom: 2.6vh;
  }
  .event-slide-note {
    font-family: 'Raleway', sans-serif;
    font-size: 1.15vw;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.75;
  }
</style>
</head>
<body>

<!-- MAIN DIRECTORY SLIDE -->
<div class="slide active" id="mainSlide">
  <header>
    <div class="brand">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" stroke="#e9c876" stroke-width="2"/>
        <path d="M50 70 V40" stroke="#6b8e5a" stroke-width="3" stroke-linecap="round"/>
        <path d="M50 55 C40 50 35 42 38 34" stroke="#6b8e5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M50 50 C60 45 65 37 62 29" stroke="#6b8e5a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <circle cx="50" cy="32" r="14" fill="#6b8e5a" opacity="0.85"/>
        <circle cx="36" cy="36" r="9" fill="#6b8e5a" opacity="0.7"/>
        <circle cx="64" cy="34" r="10" fill="#6b8e5a" opacity="0.7"/>
        <circle cx="48" cy="26" r="2.2" fill="#e9c876"/>
        <circle cx="58" cy="30" r="2.2" fill="#e9c876"/>
      </svg>
      <div class="brand-text">
        <div class="name">THE GALENA <span class="commons">COMMONS</span></div>
        <div class="addr">70 N Walnut St · Galena, OH</div>
      </div>
    </div>
  </header>
  <main>
    <section class="panel">
      <h2>Our Tenants</h2>
      <div id="tenantList"></div>
    </section>
    <section class="panel">
      <h2>Upcoming</h2>
      <div id="eventList"></div>
    </section>
  </main>
  <footer>
    <div class="wx">
      <svg id="wxIcon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="5" fill="#e9c876"/>
        <g stroke="#e9c876" stroke-width="1.6" stroke-linecap="round">
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/>
        </g>
      </svg>
      <div>
        <div class="temp" id="wxTemp">—</div>
        <div class="cond" id="wxCond">Galena, OH</div>
      </div>
    </div>
    <div class="ticker-wrap"><div class="ticker" id="ticker"></div></div>
    <div class="progress-dots" id="progressDots"></div>
  </footer>
</div>

<div id="bizSlides"></div>

<!-- Persistent time/date overlay — lives outside the .slide rotation
     entirely, so it renders on top of whichever slide is active (main
     directory or any business slide) rather than being tied to one. -->
<div class="corner-clock">
  <div class="time" id="clockTime">--:--</div>
  <div class="date" id="clockDate">Loading…</div>
</div>

<!-- Invisible looping silent video — Fire TV / Silk browser is more likely
     to treat active video playback as "not idle" than a static page, even
     with the Wake Lock API requested below. 2x2px, 1s, ~2KB. Purely a
     sleep-prevention trick; not visible or audible. -->

function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

function renderTenants() {
  document.getElementById('tenantList').innerHTML = CONFIG.tenants.map(b => `
    <div class="floor-block">
      <div class="floor-label">${esc(b.floor)}</div>
      ${b.list.map(t => `
        <div class="tenant-row">
          <span class="dot"></span>
          <span class="tname">${esc(t.name)}</span>
          ${t.tag ? `<span class="ttag">${esc(t.tag)}</span>` : ''}
        </div>`).join('')}
    </div>`).join('');
}

const MONTH_ABBR = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

function renderEvents() {
  const today = startOfDay(new Date());
  const lookahead = CONFIG.eventsLookaheadDays || 30;
  const maxShown = CONFIG.eventsMaxShown || 5;
  const cutoff = new Date(today); cutoff.setDate(cutoff.getDate() + lookahead);

  const upcoming = (CONFIG.events || [])
    .map(e => ({ ...e, _d: startOfDay(new Date(e.date + 'T00:00:00')) }))
    .filter(e => e._d >= today && e._d <= cutoff)
    .sort((a, b) => a._d - b._d)
    .slice(0, maxShown);

  const root = document.getElementById('eventList');
  if (!upcoming.length) {
    const sched = CONFIG.regularSchedule;
    if (sched && sched.items && sched.items.length) {
      root.innerHTML = `
        <div class="sched-fallback-heading">${esc(sched.heading)}</div>
        ${sched.items.map(item => `
          <div class="sched-fallback-row">
            <span class="dot"></span>
            <div>
              <div class="sched-fallback-name">${esc(item.name)}</div>
              <div class="sched-fallback-meta">${esc(item.meta)}</div>
            </div>
          </div>`).join('')}
        ${sched.note ? `<div class="sched-fallback-note">${esc(sched.note)}</div>` : ''}
      `;
    } else {
      root.innerHTML = `<div style="font-family:'Raleway',sans-serif;color:var(--cream-dim);font-size:1.1vw;opacity:0.7;">Nothing new posted for the next ${lookahead} days — see tenant hours at left.</div>`;
    }
    return;
  }
  root.innerHTML = upcoming.map(e => {
    const isToday = e._d.getTime() === today.getTime();
    return `
    <div class="event-card">
      <div class="event-date${isToday ? ' is-today' : ''}"><div class="mon">${MONTH_ABBR[e._d.getMonth()]}</div><div class="day">${e._d.getDate()}</div></div>
      <div class="event-info"><div class="etitle">${esc(e.title)}${isToday ? '<span class="today-badge">TODAY</span>' : ''}</div><div class="emeta">${esc(e.meta)}</div></div>
    </div>`;
  }).join('');
}

function renderTicker() {
  document.documentElement.style.setProperty('--ticker-duration', CONFIG.tickerSpeedSeconds + 's');
  document.getElementById('ticker').innerHTML =
    CONFIG.tickerItems.map(esc).join('  <span class="sep">&#10072;</span>  ');
}

}

function buildDots() {
  const total = 1 + CONFIG.businesses.length;
  document.getElementById('progressDots').innerHTML =
    Array.from({length: total}, (_, i) =>
      `<span id="dot${i}"${i===0?' class="active"':''}></span>`).join('');
}

// WAYFINDING FIX: the directory used to show once per full loop (up to ~72s
// wait to see it again). This builds a play order that re-inserts the
// directory every 2 business slides, so the max wait for wayfinding info
// is ~1 business slide's worth of time, not the whole loop.
// dot = which progress-dot lights up (0 = directory, 1..N = business N)
// el  = index into document.querySelectorAll('.slide') (0 = #mainSlide,
//       1..N = the biz0..bizN-1 nodes appended in DOM order)
function buildPlaylist() {
  const list = [];
  const bizCount = CONFIG.businesses.length;
  for (let i = 0; i < bizCount; i += 2) {
    list.push({ dot: 0, el: 0, dur: CONFIG.mainSlideDuration });
    list.push({ dot: i + 1, el: i + 1, dur: CONFIG.bizSlideDuration });
    if (i + 1 < bizCount) {
      list.push({ dot: i + 2, el: i + 2, dur: CONFIG.bizSlideDuration });
    }
  }
  return list;
}

let PLAYLIST = [];
let current = 0, timer = null;
function goTo(playIndex) {
  const item = PLAYLIST[playIndex];
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.slide')[item.el].classList.add('active');
  document.querySelectorAll('.progress-dots span').forEach((d,i) => d.classList.toggle('active', i===item.dot));
  current = playIndex;
  clearTimeout(timer);
  timer = setTimeout(() => goTo((current+1) % PLAYLIST.length), item.dur);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clockTime').textContent = now.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
  document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'});
}

function wxIconKeyFor(main) {
  const m = (main || '').toLowerCase();
  if (m.includes('thunder')) return 'storm';
  if (m.includes('snow')) return 'snow';
  if (m.includes('rain') || m.includes('drizzle')) return 'rain';
  if (m.includes('cloud')) return 'cloud';
  if (m.includes('mist') || m.includes('fog') || m.includes('haze') || m.includes('smoke') || m.includes('dust')) return 'fog';
  return 'sun'; // Clear, or anything OpenWeather adds that we haven't mapped
}

async function updateWeather() {
  try {
    const r = await fetch(`/.netlify/functions/weather?city=${encodeURIComponent(CONFIG.weatherCity)}&units=${encodeURIComponent(CONFIG.weatherUnits)}`);
    const d = await r.json();
    if (d?.temp != null) {
      document.getElementById('wxTemp').textContent = Math.round(d.temp) + (CONFIG.weatherUnits==='imperial'?'°F':'°C');
      document.getElementById('wxCond').textContent = d.description ?? 'Galena, OH';
      const icon = document.getElementById('wxIcon');
      if (icon) icon.innerHTML = WX_ICONS[wxIconKeyFor(d.main)];
    }
  } catch(e) {}
}

renderTenants(); renderEvents(); renderTicker();
buildBizSlides(); buildDots();
PLAYLIST = buildPlaylist();
updateClock(); updateWeather();
goTo(0);
setInterval(updateClock, 15000);
setInterval(updateWeather, 900000);
setInterval(renderEvents, 3600000); // re-check dates hourly (handles midnight rollover / expiring events)

// Sleep prevention, layer 2: the Wake Lock API. Support on Fire TV's Silk
// browser is inconsistent across Fire OS versions, so this is a bonus on
// top of the invisible looping video above, not a replacement for it.
// Fails silently and harmlessly on browsers/devices that don't support it.
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
    }
  } catch (e) {}
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// Scheduled hard reloads — clears any memory buildup from long uptime and
// picks up file edits the next time this is redeployed.
(function initScheduledReload() {
  const cfg = CONFIG.reload;
  if (!cfg || !cfg.enabled) return;
  const loadedAt = Date.now();
  let lastFiredMinuteKey = null;
  setInterval(() => {
    const now = new Date();
    if (cfg.dailyTimes && cfg.dailyTimes.length) {
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const minuteKey = `${now.toDateString()} ${hh}:${mm}`;
      if (cfg.dailyTimes.includes(`${hh}:${mm}`) && minuteKey !== lastFiredMinuteKey) {
        lastFiredMinuteKey = minuteKey;
        location.reload();
        return;
      }
    }
    if (cfg.everyHours && Date.now() - loadedAt >= cfg.everyHours * 3600000) {
      location.reload();
    }
  }, 30000);
})();
