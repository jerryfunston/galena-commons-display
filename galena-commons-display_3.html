<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Galena Commons</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --navy: #1f3a5f;
    --navy-deep: #16293f;
    --sage: #6b8e5a;
    --honey: #e9c876;
    --cream: #f7f3ec;
    --cream-dim: #ece5d6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--navy-deep);
    font-family: 'Source Serif 4', Georgia, serif;
    color: var(--cream);
  }

  /* ---- SLIDE WRAPPER ---- */
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.9s ease;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ========== MAIN DIRECTORY SLIDE ========== */
  #mainSlide {
    display: grid;
    grid-template-rows: auto 1fr auto;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(107,142,90,0.12), transparent 55%),
      radial-gradient(ellipse at 85% 100%, rgba(233,200,118,0.08), transparent 50%),
      var(--navy-deep);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 2vh 3.5vw 1.6vh;
    border-bottom: 1px solid rgba(233,200,118,0.25);
  }

  .brand { display: flex; align-items: center; gap: 1.2vw; }
  .brand svg { width: 4vw; height: 4vw; min-width: 44px; min-height: 44px; }
  .brand-text .name {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 2.4vw;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .brand-text .name .commons { color: var(--honey); }
  .brand-text .addr {
    font-family: 'Raleway', sans-serif;
    font-size: 0.9vw;
    color: var(--cream-dim);
    letter-spacing: 0.08em;
    margin-top: 0.4vh;
    text-transform: uppercase;
  }

  .clockwx { text-align: right; font-family: 'Raleway', sans-serif; }
  .clockwx .time { font-size: 2.4vw; font-weight: 300; line-height: 1; letter-spacing: 0.02em; }
  .clockwx .date { font-size: 0.9vw; color: var(--cream-dim); margin-top: 0.4vh; letter-spacing: 0.06em; text-transform: uppercase; }

  main {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    overflow: hidden;
  }

  .panel { padding: 2.5vh 3.5vw; overflow: hidden; }
  .panel + .panel { border-left: 1px solid rgba(233,200,118,0.2); }

  .panel h2 {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 1.3vw;
    letter-spacing: 0.1em;
    color: var(--honey);
    text-transform: uppercase;
    margin-bottom: 2vh;
    display: flex;
    align-items: center;
    gap: 0.8vw;
  }
  .panel h2::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(233,200,118,0.4), transparent);
  }

  .floor-block { margin-bottom: 2.2vh; }
  .floor-label {
    font-family: 'Raleway', sans-serif;
    font-size: 0.85vw;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 0.8vh;
  }
  .tenant-row {
    display: flex;
    align-items: baseline;
    gap: 1vw;
    padding: 0.8vh 0;
    border-bottom: 1px dotted rgba(247,243,236,0.18);
    font-size: 1.4vw;
  }
  .tenant-row .dot {
    width: 0.45vw; height: 0.45vw; min-width: 5px; min-height: 5px;
    border-radius: 50%;
    background: var(--honey);
    flex-shrink: 0;
    margin-bottom: 0.2vh;
  }
  .tenant-row .tname { font-weight: 600; }
  .tenant-row .ttag {
    font-family: 'Raleway', sans-serif;
    font-size: 0.85vw;
    color: var(--cream-dim);
    margin-left: auto;
    text-align: right;
  }

  .event-card {
    display: flex;
    gap: 1.2vw;
    padding: 1.4vh 0;
    border-bottom: 1px solid rgba(247,243,236,0.1);
  }
  .event-date {
    flex-shrink: 0;
    width: 4.4vw;
    text-align: center;
    background: rgba(107,142,90,0.18);
    border: 1px solid rgba(107,142,90,0.4);
    border-radius: 8px;
    padding: 0.7vh 0;
    font-family: 'Raleway', sans-serif;
  }
  .event-date .mon { font-size: 0.75vw; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sage); }
  .event-date .day { font-size: 1.7vw; font-weight: 700; line-height: 1.1; }
  .event-info .etitle { font-size: 1.25vw; font-weight: 600; }
  .event-info .emeta { font-family: 'Raleway', sans-serif; font-size: 0.9vw; color: var(--cream-dim); margin-top: 0.3vh; }

  footer {
    display: flex;
    align-items: center;
    gap: 2vw;
    padding: 1.4vh 3.5vw;
    background: rgba(0,0,0,0.18);
    border-top: 1px solid rgba(233,200,118,0.25);
  }

  .wx { display: flex; align-items: center; gap: 0.8vw; flex-shrink: 0; font-family: 'Raleway', sans-serif; }
  .wx svg { width: 2.4vw; height: 2.4vw; min-width: 28px; min-height: 28px; }
  .wx .temp { font-size: 1.7vw; font-weight: 700; }
  .wx .cond { font-size: 0.85vw; color: var(--cream-dim); }

  .ticker-wrap {
    flex: 1;
    overflow: hidden;
    white-space: nowrap;
    mask-image: linear-gradient(to right, transparent, black 4%, black 96%, transparent);
    -webkit-mask-image: linear-gradient(to right, transparent, black 4%, black 96%, transparent);
  }
  .ticker {
    display: inline-block;
    padding-left: 100%;
    font-family: 'Raleway', sans-serif;
    font-size: 1vw;
    letter-spacing: 0.02em;
    animation: scroll-left var(--ticker-duration, 40s) linear infinite;
  }
  .ticker .sep { color: var(--honey); margin: 0 1.4vw; }
  @keyframes scroll-left { from { transform: translateX(0); } to { transform: translateX(-100%); } }

  /* slide progress dots */
  .progress-dots {
    display: flex;
    gap: 0.5vw;
    flex-shrink: 0;
  }
  .progress-dots span {
    width: 0.5vw; height: 0.5vw; min-width: 6px; min-height: 6px;
    border-radius: 50%;
    background: rgba(233,200,118,0.3);
    transition: background 0.3s;
  }
  .progress-dots span.active { background: var(--honey); }

  /* ========== BUSINESS SLIDES ========== */
  .biz-slide {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0;
    position: relative;
    overflow: hidden;
  }

  .biz-bg {
    position: absolute;
    inset: 0;
    opacity: 0.07;
    background-image: radial-gradient(circle at 30% 30%, white 1px, transparent 1px),
                      radial-gradient(circle at 70% 70%, white 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .biz-content {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 5vw;
    width: 100%;
    height: 100%;
    padding: 8vh 7vw 10vh;
  }

  .biz-left {
    text-align: left;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .biz-eyebrow {
    font-family: 'Raleway', sans-serif;
    font-size: 1vw;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 1.8vh;
  }

  .biz-name {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 3.8vw;
    line-height: 1.15;
    margin-bottom: 2.5vh;
  }

  .biz-tagline {
    font-family: 'Raleway', sans-serif;
    font-size: 1.35vw;
    font-weight: 300;
    line-height: 1.6;
    opacity: 0.85;
    margin-bottom: 2.5vh;
  }

  .biz-url {
    font-family: 'Raleway', sans-serif;
    font-size: 1vw;
    letter-spacing: 0.05em;
    opacity: 0.6;
  }

  .biz-right {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qr-wrap {
    background: white;
    padding: 1vw;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8vh;
  }
  .qr-wrap canvas, .qr-wrap img { display: block; }
  .qr-label {
    font-family: 'Raleway', sans-serif;
    font-size: 0.7vw;
    color: var(--navy-deep);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
  }

  .biz-watermark {
    position: absolute;
    bottom: 2vh;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', Georgia, serif;
    font-size: 0.8vw;
    letter-spacing: 0.15em;
    opacity: 0.35;
    white-space: nowrap;
    z-index: 2;
  }

  .biz-accent {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    z-index: 2;
  }
</style>
</head>
<body>

  <header>

      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">

          <line x1="4.2" y1="4.2" x2="5.6" y2="5.6"/><line x1="18.4" y1="18.4" x2="19.8" y2="19.8"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.2" y1="19.8" x2="5.6" y2="18.4"/><line x1="18.4" y1="5.6" x2="19.8" y2="4.2"/>
        </g>
      </svg>
      <div>
        <div class="temp" id="wxTemp">—</div>
        <div class="cond" id="wxCond">Galena, OH</div>
      </div>
    </div>
    <div class="ticker-wrap">
      <div class="ticker" id="ticker"></div>
    </div>
    <div class="progress-dots" id="progressDots"></div>
  </footer>
</div>

<!-- ===== BUSINESS SLIDES (generated by JS) ===== -->
<div id="bizSlides"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/webfont/1.6.28/webfontloader.js"></script>
<script>
  WebFont.load({ google: { families: ['Cinzel:600,700','Raleway:300,400,600','Source Serif 4:400,600'] } });
</script>

<script>
/* ================================================================
   EDIT THIS — all content lives here.
   ================================================================ */
const CONFIG = {

  weatherApiKey: "2f04018ea7c9188d481144c8e27637ac",
  weatherCity: "Galena,OH,US",
  weatherUnits: "imperial",

  mainSlideDuration: 20000,  // ms — how long directory shows
  bizSlideDuration:  10000,  // ms — how long each business slide shows

  tenants: [
    {
      floor: "First Floor",
      list: [
        { name: "Common Tax & Bookkeeping", tag: "Tax · Bookkeeping · IRS Rep" },
        { name: "Grace Church",             tag: "" },
        { name: "Common Table Church",      tag: "Sundays, Evening" },
      ]
    },
    {

        { name: "A Warrior's Place Yoga",  tag: "" },
        { name: "Wild Blooms Wellness",    tag: "" },
        { name: "LA Counseling",           tag: "" },
      ]
    }
  ],

  events: [
    { month: "JUL", day: "06", title: "Common Table Church",     meta: "Sunday · 6:00 PM" },
    { month: "JUL", day: "12", title: "Food Pantry Volunteer Day", meta: "Saturday · 9:00 AM" },
    { month: "JUL", day: "13", title: "Common Table Church",     meta: "Sunday · 6:00 PM" },
    { month: "JUL", day: "20", title: "Common Table Church",     meta: "Sunday · 6:00 PM" },
  ],

  tickerItems: [
    "Welcome to The Galena Commons — Community · Commerce · Connection",

    "Second floor tenants: A Warrior's Place Yoga · Wild Blooms Wellness · LA Counseling",
  ],

  tickerSpeedSeconds: 38,

  // Business slides — one per tenant.
  // bg: CSS background value for the slide.
  // accent: top bar color.
  businesses: [
    {
      name:    "Common Tax\n& Bookkeeping",
      eyebrow: "First Floor · Tax & Financial Services",
      tagline: "Tax preparation, bookkeeping, and IRS representation.\nMeeting you where you are — with integrity, compassion, and wisdom.",
      url:     "commontaxpro.com",
      qr:      "https://commontaxpro.com",
      bg:      "linear-gradient(135deg, #16293f 0%, #1f3a5f 100%)",
      accent:  "#e9c876",
      text:    "#f7f3ec",
    },
    {
      name:    "Grace Church",
      eyebrow: "First Floor · Faith Community",
      tagline: "A welcoming congregation\ngathering right here in the Commons.",
      url:     "sunbury.church",
      qr:      "https://sunbury.church/",
      bg:      "linear-gradient(135deg, #1a3a2a 0%, #2a5a3a 100%)",
      accent:  "#6b8e5a",
      text:    "#f7f3ec",
    },
    {
      name:    "Common Table\nChurch",
      eyebrow: "First Floor · Faith Community",
      tagline: "Sunday evenings. All are welcome\nat the table.",
      url:     "thegalenacommons.com",
      qr:      "https://thegalenacommons.com",
      bg:      "linear-gradient(135deg, #16293f 0%, #2a3f5f 100%)",
      accent:  "#e9c876",
      text:    "#f7f3ec",
    },
    {
      name:    "A Warrior's\nPlace Yoga",
      eyebrow: "Second Floor · Yoga & Wellness",
      tagline: "Find your strength. Find your peace.\nYoga for every body.",
      url:     "awarriorsplace.com",
      qr:      "https://awarriorsplace.com/",
      bg:      "linear-gradient(135deg, #2a1f3f 0%, #3f2f5f 100%)",
      accent:  "#b09fd0",

    },
    {
      name:    "Wild Blooms\nWellness",
      eyebrow: "Second Floor · Wellness",
      tagline: "Rooted in nature. Blooming in health.\nHolistic wellness services.",
      url:     "wildbloomswellness.com",
      qr:      "https://www.wildbloomswellness.com/",

    {

      url:     "lacounselingservices.com",
      qr:      "https://www.lacounselingservices.com/",
      bg:      "linear-gradient(135deg, #1f2a3f 0%, #2f3f5a 100%)",
      accent:  "#7aa8c4",
      text:    "#f7f3ec",
    },
  ],
};

/* ================================================================
   RENDERING — no need to edit below this line
   ================================================================ */

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

// ---- Tenants ----
function renderTenants() {
  document.getElementById('tenantList').innerHTML = CONFIG.tenants.map(block => `
    <div class="floor-block">
      <div class="floor-label">${escapeHtml(block.floor)}</div>
      ${block.list.map(t => `
        <div class="tenant-row">
          <span class="dot"></span>
          <span class="tname">${escapeHtml(t.name)}</span>
          ${t.tag ? `<span class="ttag">${escapeHtml(t.tag)}</span>` : ''}
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ---- Events ----
function renderEvents() {
  const root = document.getElementById('eventList');
  if (!CONFIG.events.length) {
    root.innerHTML = `<div style="font-family:'Raleway',sans-serif;color:var(--cream-dim);font-size:1.1vw;">No upcoming events posted.</div>`;
    return;
  }
  root.innerHTML = CONFIG.events.map(e => `
    <div class="event-card">
      <div class="event-date">
        <div class="mon">${escapeHtml(e.month)}</div>
        <div class="day">${escapeHtml(e.day)}</div>
      </div>
      <div class="event-info">
        <div class="etitle">${escapeHtml(e.title)}</div>
        <div class="emeta">${escapeHtml(e.meta)}</div>
      </div>
    </div>
  `).join('');
}

// ---- Ticker ----
function renderTicker() {
  document.documentElement.style.setProperty('--ticker-duration', CONFIG.tickerSpeedSeconds + 's');
  document.getElementById('ticker').innerHTML =
    CONFIG.tickerItems.map(escapeHtml).join('  <span class="sep">&#10072;</span>  ');
}

// ---- Business slides ----
function buildBizSlides() {
  const container = document.getElementById('bizSlides');
  CONFIG.businesses.forEach((biz, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide biz-slide';
    slide.id = `bizSlide${i}`;
    slide.style.background = biz.bg;
    slide.style.color = biz.text;

    const nameHtml = biz.name.split('\n').map(escapeHtml).join('<br>');
    const taglineHtml = biz.tagline.split('\n').map(escapeHtml).join('<br>');

    slide.innerHTML = `
      <div class="biz-accent" style="background:${biz.accent}"></div>
      <div class="biz-bg"></div>
      <div class="biz-content">
        <div class="biz-left">
          <div class="biz-eyebrow" style="color:${biz.accent}">${escapeHtml(biz.eyebrow)}</div>
          <div class="biz-name">${nameHtml}</div>
          <div class="biz-tagline">${taglineHtml}</div>
          <div class="biz-url" style="color:${biz.accent}">${escapeHtml(biz.url)}</div>
        </div>
        <div class="biz-right">
          <div class="qr-wrap">
            <div id="qr${i}"></div>
            <div class="qr-label">Scan to visit</div>
          </div>
        </div>
      </div>
      <div class="biz-watermark">THE GALENA COMMONS · 70 N WALNUT ST · GALENA, OH</div>
    `;
    container.appendChild(slide);

    // Generate QR code after element is in DOM
    setTimeout(() => {
      new QRCode(document.getElementById(`qr${i}`), {
        text: biz.qr,
        width: Math.round(window.innerWidth * 0.12),
        height: Math.round(window.innerWidth * 0.12),
        colorDark: "#1f3a5f",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }, 200);
  });
}

// ---- Progress dots ----
function buildDots() {
  const total = 1 + CONFIG.businesses.length;
  document.getElementById('progressDots').innerHTML =
    Array.from({length: total}, (_, i) =>
      `<span id="dot${i}" ${i === 0 ? 'class="active"' : ''}></span>`
    ).join('');
}

// ---- Slide rotation ----
const slides = () => [document.getElementById('mainSlide'), ...document.querySelectorAll('.biz-slide')];
let currentSlide = 0;
let rotationTimer = null;

function goToSlide(index) {
  const all = slides();
  all.forEach(s => s.classList.remove('active'));
  all[index].classList.add('active');

  document.querySelectorAll('.progress-dots span').forEach((d, i) => {
    d.classList.toggle('active', i === index);
  });

  currentSlide = index;
  clearTimeout(rotationTimer);
  const duration = index === 0 ? CONFIG.mainSlideDuration : CONFIG.bizSlideDuration;
  rotationTimer = setTimeout(() => goToSlide((currentSlide + 1) % all.length), duration);
}

// ---- Clock ----
function updateClock() {
  const now = new Date();
  document.getElementById('clockTime').textContent =
    now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  document.getElementById('clockDate').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

// ---- Weather ----
async function updateWeather() {
  if (!CONFIG.weatherApiKey) return;
  try {
    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(CONFIG.weatherCity)}&units=${CONFIG.weatherUnits}&appid=${CONFIG.weatherApiKey}`);
    const data = await res.json();
    if (data?.main) {
      const sym = CONFIG.weatherUnits === 'imperial' ? '°F' : '°C';
      document.getElementById('wxTemp').textContent = Math.round(data.main.temp) + sym;
      document.getElementById('wxCond').textContent = data.weather?.[0]?.description ?? 'Galena, OH';
    }
  } catch(e) {
    document.getElementById('wxTemp').textContent = '—';
  }
}

// ---- Init ----
renderTenants();
